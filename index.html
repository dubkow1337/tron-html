<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Tron: Light Cycles | REDRABBIT</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="tron-container">
        <div class="header">
            <div class="logo">
                <span class="red">RED</span><span class="rabbit">RABBIT</span>
                <div class="logo-sub">LIGHT CYCLES</div>
            </div>
        </div>

        <div class="game-layout">
            <!-- Левая панель -->
            <div class="panel left-panel">
                <!-- Счёт с кружками -->
                <div class="score neon-card">
                    <div class="score-title">⚡ СЧЁТ ⚡</div>
                    <div class="score-values">
                        <div class="score-player">
                            <div class="player-circle blue"></div>
                            <span class="player-name">СИНИЙ</span>
                            <span class="player-score" id="player1Score">0</span>
                        </div>
                        <div class="score-divider">:</div>
                        <div class="score-player">
                            <div class="player-circle orange"></div>
                            <span class="player-name">ОРАНЖЕВЫЙ</span>
                            <span class="player-score" id="player2Score">0</span>
                        </div>
                    </div>
                </div>

                <!-- Управление с кружками -->
                <div class="controls-panel neon-card">
                    <div class="controls-title">🎮 УПРАВЛЕНИЕ</div>
                    <div class="control-item">
                        <span class="control-key">↑ ↓ ← →</span>
                        <span class="control-desc">
                            <span class="control-circle blue"></span> СИНИЙ
                        </span>
                    </div>
                    <div class="control-item" id="player2-controls">
                        <span class="control-key">W A S D</span>
                        <span class="control-desc">
                            <span class="control-circle orange"></span> ОРАНЖЕВЫЙ
                        </span>
                    </div>
                </div>

                <div class="record-card neon-card">
                    <div class="controls-title">🏆 РЕКОРД</div>
                    <div class="record-value" id="recordDisplay">0</div>
                </div>

                <div class="tips-panel neon-card">
                    <div class="tips-title">💡 СОВЕТЫ</div>
                    <ul>
                        <li>Не врезайся в следы</li>
                        <li>Не касайся границ</li>
                        <li>Зажимай противника</li>
                    </ul>
                </div>
            </div>

            <!-- Центр: игровое поле -->
            <div class="game-center">
                <canvas id="gameCanvas" width="800" height="600"></canvas>
                <div id="gameMessage" class="game-message"></div>
                <div id="victoryOverlay" class="victory-overlay"></div>
            </div>

            <!-- Правая панель -->
            <div class="panel right-panel">
                <div class="mode-selector neon-card">
                    <div class="mode-title">⚔️ ПРОТИВНИК</div>
                    <button id="opponent2p" class="mode-btn active">👥 2 ИГРОКА</button>
                    <button id="opponentAI" class="mode-btn">🤖 VS AI</button>
                    <button id="opponentSurvival" class="mode-btn">☠️ ВЫЖИВАНИЕ</button>
                </div>

                <div class="arena-selector neon-card">
                    <div class="mode-title">🏆 РЕЖИМ МАТЧА</div>
                    <button id="matchClassic" class="mode-btn active">🏁 КЛАССИКА</button>
                    <button id="matchTournament" class="mode-btn">🏆 ТУРНИР (3)</button>
                </div>

                <button id="soundToggle" class="sound-btn">🔊</button>
                <button id="playButton" class="play-button-right">🚀 ИГРАТЬ</button>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
