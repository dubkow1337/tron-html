<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tron: Light Cycles | REDRABBIT</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="tron-container">
        <div class="header">
            <div class="logo">
                <span class="red">RED</span><span class="rabbit">RABBIT</span>
                <div class="logo-sub">LIGHT CYCLES</div>
            </div>
        </div>

        <div class="game-layout">
            <!-- ЛЕВАЯ ПАНЕЛЬ: счёт + управление -->
            <div class="panel left-panel">
                <div class="score neon-card">
                    <div class="score-title">⚡ СЧЁТ ⚡</div>
                    <div class="score-values">
                        <div class="score-player">
                            <span class="player-icon">🔵</span>
                            <span class="player-name">СИНИЙ</span>
                            <span class="player-score" id="player1Score">0</span>
                        </div>
                        <div class="score-divider">:</div>
                        <div class="score-player">
                            <span class="player-icon">🔴</span>
                            <span class="player-name">КРАСНЫЙ</span>
                            <span class="player-score" id="player2Score">0</span>
                        </div>
                    </div>
                </div>

                <div class="controls-panel neon-card">
                    <div class="controls-title">🎮 УПРАВЛЕНИЕ</div>
                    <div class="control-item">
                        <span class="control-key">↑ ↓ ← →</span>
                        <span class="control-desc">🔵 СИНИЙ</span>
                    </div>
                    <div class="control-item" id="player2-controls">
                        <span class="control-key">W A S D</span>
                        <span class="control-desc">🔴 КРАСНЫЙ</span>
                    </div>
                </div>

                <div class="tips-panel neon-card">
                    <div class="tips-title">💡 СОВЕТЫ</div>
                    <ul>
                        <li>Не врезайся в следы</li>
                        <li>Не касайся границ</li>
                        <li>Зажимай противника</li>
                    </ul>
                </div>
            </div>

            <!-- ЦЕНТР: игровое поле (без кнопки) -->
            <div class="game-center">
                <canvas id="gameCanvas" width="800" height="600"></canvas>
                <div id="gameMessage" class="game-message"></div>
            </div>

            <!-- ПРАВАЯ ПАНЕЛЬ: выбор режима + кнопка ИГРАТЬ -->
            <div class="panel right-panel">
                <div class="mode-selector neon-card">
                    <div class="mode-title">⚔️ ВЫБОР ПРОТИВНИКА</div>
                    <button id="mode2p" class="mode-btn active">👥 2 ИГРОКА</button>
                    <button id="modeAI" class="mode-btn">🤖 VS ИИ</button>
                    <div class="mode-note">Режим VS AI — красным управляет компьютер</div>
                </div>
                <button id="playButton" class="play-button-right">🚀 ИГРАТЬ</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
